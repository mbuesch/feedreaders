name: Build and test

on:
  push:
  pull_request:
  workflow_dispatch:

env: 
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build_and_test:
    name: Build and test
    strategy:
      matrix:
        toolchain:
          - name: stable
            version: stable
        os:
          - name: linux
            version: ubuntu-latest
    runs-on: ${{ matrix.os.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: ~/.rustup
          key: rustup-${{ runner.os.version }}-${{ matrix.toolchain.version }}
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: ~/.cargo
          key: cargo-${{ runner.os.version }}-${{ matrix.toolchain.version }}

      - run: sudo apt install libsqlite3-dev
      - run: rustup update ${{ matrix.toolchain.version }}
      - run: rustup default ${{ matrix.toolchain.version }}
      - run: rustup component add clippy

      - run: cargo build
      - run: cargo clippy -- --deny warnings
      - run: cargo clippy --tests -- --deny warnings

      - run: cargo test

